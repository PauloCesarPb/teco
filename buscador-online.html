<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparar precios · TECO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="site-header"></div>
  <section class="section section-soft" style="padding-bottom:28px">
    <div class="container">
      <h2 style="margin-bottom:8px">Comparar precios</h2>
      <p class="muted" style="margin-bottom:18px">Busca por nombre, modelo o característica (capacidad, RAM, pulgadas…) y mira al instante en qué tienda está más barato.</p>
      <form class="searchbar" id="cmp-search" style="margin:0">
        <input type="text" id="cmp-q" placeholder="Ej.: iPhone 15 Pro 128GB · 16GB 512GB · 20W USB-C" aria-label="Buscar" />
        <button class="btn btn-primary" type="submit">Buscar</button>
      </form>
    </div>
  </section>
  <section class="section" style="padding-top:30px">
    <div class="container">
      <div id="result"></div>
    </div>
  </section>
  <div id="site-footer"></div>
  <script src="data.js"></script>
  <script src="compare-view.js"></script>
  <script src="nav.js"></script>
  <script src="buscador-online.js"></script>
</body>
</html>
