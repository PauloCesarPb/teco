<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta · TECO</title>
  <link rel="icon" href="img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="site-header"></div>
  <div class="auth-wrap">
    <div class="panel auth-card">
      <h2 style="text-align:center">Crear cuenta</h2>
      <p class="muted" style="text-align:center;margin-bottom:18px">Guarda tus favoritos y compara más rápido. Es gratis.</p>
      <form class="form" id="register-form" style="max-width:100%">
        <div class="field"><label>Nombre</label><input id="r-nombre" autocomplete="name" required /></div>
        <div class="field"><label>Correo</label><input id="r-email" type="email" autocomplete="email" required /></div>
        <div class="field"><label>Contraseña (mínimo 6 caracteres)</label><input id="r-pass" type="password" minlength="6" autocomplete="new-password" required /></div>
        <button class="btn btn-primary btn-block" type="submit">Crear cuenta</button>
        <div id="register-msg"></div>
      </form>
      <p class="muted" style="text-align:center;margin-top:18px;font-size:.9rem">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </p>
      <p class="muted" style="text-align:center;margin-top:6px;font-size:.86rem">
        ¿Tienes una tienda? <a href="proveedor.html">Afilíala como proveedor</a>
      </p>
    </div>
  </div>
  <div id="site-footer"></div>
  <script src="data.js"></script>
  <script src="nav.js"></script>
  <script src="register.js"></script>
</body>
</html>
