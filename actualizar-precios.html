<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar precios · TECO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="auth-admin.js"></script>
</head>
<body>
  <div id="site-header"></div>
  <section class="section">
    <div class="container" style="max-width:640px">
      <h2>Editar precios manualmente</h2>
      <p class="muted">Útil cuando una tienda bloquea la lectura automática.</p>
      <div class="panel" style="margin-top:18px">
        <form class="form" id="ref-form" style="max-width:100%">
          <div class="field"><label>Producto</label><select id="r-prod"></select></div>
          <div class="field"><label>Tienda</label><select id="r-comp"></select></div>
          <div class="grid-2">
            <div class="field"><label>Precio (S/)</label><input id="r-price" type="number" step="0.01" /></div>
            <div class="field"><label>Fecha</label><input id="r-date" type="date" /></div>
          </div>
          <div class="field"><label>Enlace exacto del producto</label><input id="r-link" placeholder="https://…" /></div>
          <div class="field"><label>Estado</label>
            <select id="r-status"><option>Validado</option><option>Búsqueda en tienda</option></select>
          </div>
          <button class="btn btn-primary btn-block" type="submit">Guardar</button>
          <div id="ref-msg"></div>
        </form>
      </div>
    </div>
  </section>
  <div id="site-footer"></div>
  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="referencias-mercado.js"></script>
  <script src="nav.js"></script>
  <script src="actualizar-precios.js"></script>
</body>
</html>
